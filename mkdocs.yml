site_name: eksreview
site_description: >-
  AI-powered conversational CLI agent that reviews Amazon EKS clusters against
  operational best practices.
repo_name: GitHub
repo_url: https://github.com/aws-samples/sample-eksreview
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - assets/extra.css

extra:
  generator: false

plugins:
  - search

exclude_docs: |
  adr/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Prerequisites: getting-started/prerequisites.md
      - Installation: getting-started/installation.md
      - Your First Review: getting-started/first-review.md
      - FAQ: faq.md
  - Usage:
      - Example Prompts: usage/example-prompts.md
      - Slash Commands: usage/slash-commands.md
      - Reports: usage/reports.md
      - Knowledge Base: usage/knowledge-base.md
      - Sample Reports:
          - Assessment Report: examples/sample-assessment-report.md
          - Upgrade Readiness Report: examples/sample-upgrade-readiness-report.md
  - Configuration:
      - Environment Variables: configuration/environment-variables.md
      - Models & Regions: configuration/models.md
      - Credentials: configuration/credentials.md
      - Command-line Flags: configuration/cli-flags.md
  - Reference:
      - What Gets Checked: reference/what-gets-checked.md
      - Permissions: reference/permissions.md
      - Cost: reference/cost.md
      - Performance: reference/performance.md
      - Local Data: reference/data-and-cleanup.md
      - Safety Model: reference/safety.md
      - Troubleshooting: reference/troubleshooting.md
  - Architecture: architecture.md
